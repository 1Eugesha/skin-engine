<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>SkinEngine diag</title>
<style>
  body{margin:0;background:#15130f;color:#f5e9c8;font:14px/1.4 monospace;padding:16px}
  h1{font-size:18px;color:#ffcf57;margin:0 0 12px}
  .row{display:flex;gap:18px;flex-wrap:wrap}
  .cell{background:#0d0b08;border:1px solid #3a3222;border-radius:10px;padding:10px}
  .cell h2{font-size:13px;margin:0 0 8px;color:#ffcf57;text-align:center}
  canvas{display:block;background:#000;border-radius:6px}
  pre{white-space:pre-wrap;background:#0d0b08;border:1px solid #3a3222;border-radius:10px;padding:12px;margin-top:16px;color:#bfe6c4;max-width:1100px}
  .err{color:#ff7a7a}
</style>
</head>
<body>
<h1>SkinEngine diagnostic — nick 1Eugesha</h1>
<div class="row" id="row"></div>
<pre id="log">loading…</pre>

<script src="skin-engine.js?v=diag1"></script>
<script>
const SKIN = "https://mc-heads.net/skin/1Eugesha";
const logEl = document.getElementById("log");
const rowEl = document.getElementById("row");
let LOG = [];
function log(s){ LOG.push(s); logEl.textContent = LOG.join("\n"); }

function cell(title){
  const c = document.createElement("div"); c.className="cell";
  const h = document.createElement("h2"); h.textContent=title; c.appendChild(h);
  const cv = document.createElement("canvas"); c.appendChild(cv);
  rowEl.appendChild(c);
  return cv;
}

async function main(){
  let sv;
  try { sv = await SkinEngine.load(); } catch(e){ log("skinview3d load FAILED: "+e); return; }
  log("skinview3d loaded. version cfg zoom=0.7");

  const V3 = null;
  // helper: static posed viewer
  async function posed(title, pose, rotY){
    const cv = cell(title);
    const v = new sv.SkinViewer({ canvas: cv, width: 230, height: 330 });
    v.fov = 45; v.zoom = 0.72; v.autoRotate = false;
    try { await v.loadSkin(SKIN); } catch(e){ log(title+": loadSkin FAILED "+e); }
    const p = v.playerObject;
    try { SkinEngine.ensureRig(p); SkinEngine.restPose(p); SkinEngine.fixTransparency(p); } catch(e){ log(title+": rig FAILED "+e); }
    v.animation = null;
    if (rotY != null) p.rotation.y = rotY;
    try { SkinEngine.applyPose(p.skin, { tracks: pose }, k => (pose[k]||0)); } catch(e){ log(title+": applyPose FAILED "+e); }
    try { v.render(); } catch(e){}
    return { v, p };
  }

  // 1) rest
  await posed("REST", {});
  // 2) elbow bend 90
  await posed("ARM bend -90", { "rightArm.bend": -Math.PI/2 });
  // 3) knee bend 90
  await posed("LEG bend -90", { "rightLeg.bend": -Math.PI/2 });
  // 4) arm raised forward + bend (like emote)
  const r4 = await posed("ARM raise+bend", { "rightArm.pitch": -1.4, "rightArm.bend": -1.3 });
  // 5) rest, side view (see layer z-fight / gaps in profile)
  await posed("REST side", {}, Math.PI/2);

  // ---- graph dump of the rightArm ----
  try {
    const p = r4.p, sk = p.skin;
    const arm = sk.rightArm;
    const V = sk.position.constructor; // Vector3
    const Box = null;
    function wpos(o){ const v=new V(); o.getWorldPosition(v); return `(${v.x.toFixed(2)}, ${v.y.toFixed(2)}, ${v.z.toFixed(2)})`; }
    function dump(o, d){
      const pad = "  ".repeat(d);
      let s = `${pad}${o.type} name=${o.name||"-"} pos(${o.position.x.toFixed(2)},${o.position.y.toFixed(2)},${o.position.z.toFixed(2)}) scale(${o.scale.x.toFixed(2)},${o.scale.y.toFixed(2)},${o.scale.z.toFixed(2)})`;
      log(s);
      (o.children||[]).forEach(ch => dump(ch, d+1));
    }
    log("\n=== rightArm graph ===");
    dump(arm, 0);
    log("bendJoint present: " + !!arm.__bendJoint + "  __limbLen=" + arm.__limbLen);
    if (arm.__bendJoint) log("bendJoint children: " + arm.__bendJoint.children.length);
    const inner = arm.children[0];
    log("innerGrp children count (after bend): " + (inner && inner.children.length));
  } catch(e){ log("dump FAILED: "+e); }

  log("\nDONE");
}
main().catch(e => log("FATAL: "+e));
</script>
</body>
</html>
